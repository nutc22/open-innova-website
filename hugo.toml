baseURL = "https://daniele.nucciarelli.it"
locale = "it"
title = "Daniele Nucciarelli"

# Default language (Italian)
defaultContentLanguage = "it"
defaultContentLanguageInSubdir = false

# Enable emoji support
enableEmoji = true

# Pluralize titles
pluralizeListTitles = false

# Taxonomies disabled until needed
disableKinds = ["taxonomy", "term"]

# Output formats — add Europass XML on the CV page (see [outputFormats.europass])
[outputs]
home = ["HTML"]
page = ["HTML"]
section = ["HTML"]

# Custom output format: Europass-compatible XML export, rendered from CV data.
[outputFormats]
[outputFormats.europass]
name = "europass"
mediaType = "application/xml"
baseName = "cv-europass"
isPlainText = true
rel = "alternate"

[mediaTypes]
[mediaTypes."application/xml"]
suffixes = ["xml"]

# Multilingual configuration
[languages]
[languages.it]
label = "Italiano"
locale = "it"
weight = 1
contentDir = "content/it"

[[languages.it.menu.main]]
name = "Profilo"
url = "/#profilo"
weight = 1
[[languages.it.menu.main]]
name = "Esperienze"
url = "/#esperienze"
weight = 2
[[languages.it.menu.main]]
name = "Competenze"
url = "/#competenze"
weight = 3
[[languages.it.menu.main]]
name = "Formazione"
url = "/#formazione"
weight = 4
[[languages.it.menu.main]]
name = "Oltre il lavoro"
url = "/#altro"
weight = 5
[[languages.it.menu.main]]
name = "Contatti"
url = "/#contatti"
weight = 6

[languages.en]
label = "English"
locale = "en"
weight = 2
contentDir = "content/en"

[[languages.en.menu.main]]
name = "Profile"
url = "/en/#profilo"
weight = 1
[[languages.en.menu.main]]
name = "Experience"
url = "/en/#esperienze"
weight = 2
[[languages.en.menu.main]]
name = "Skills"
url = "/en/#competenze"
weight = 3
[[languages.en.menu.main]]
name = "Education"
url = "/en/#formazione"
weight = 4
[[languages.en.menu.main]]
name = "Beyond work"
url = "/en/#altro"
weight = 5
[[languages.en.menu.main]]
name = "Contact"
url = "/en/#contatti"
weight = 6

# Build settings
[build]
writeStats = true

# Markup settings
[markup]
[markup.goldmark]
hardWraps = false
[markup.goldmark.renderer]
unsafe = true
[markup.tableOfContents]
startLevel = 2
endLevel = 3
ordered = false
