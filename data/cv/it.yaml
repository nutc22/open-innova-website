hero:
  badge: "Disponibile per nuove collaborazioni"
  headline: "Fisico · Cloud & ML Engineer"
  tagline: >-
    Trasformo problemi complessi in infrastrutture affidabili e modelli che
    reggono la produzione, con il rigore metodologico della fisica sperimentale.
  cta_primary: "Contattami"
  cta_secondary: "Vedi il CV"

profilo:
  eyebrow: "01 — Profilo"
  title: "Dalla teoria al sistema in produzione"
  paragraphs:
    - >-
      Sono un fisico di formazione che progetta e gestisce infrastrutture cloud e
      sistemi di machine learning. Porto il metodo sperimentale — misurare, isolare
      le variabili, iterare — dentro il ciclo di vita di piattaforme e modelli reali.
    - >-
      Lavoro ogni giorno con <strong>AWS e Kubernetes</strong>, costruisco pipeline
      di dati e mi occupo di anomaly detection e di evaluation e red teaming di
      agenti basati su LLM. Mi interessa l'affidabilità: osservabilità, contenimento
      dei costi, riproducibilità.
    - >-
      Cerco sistemi essenziali: poche dipendenze, comportamento prevedibile,
      documentazione onesta. Questo sito ne è un esempio — statico, senza cookie,
      senza tracciamento.

