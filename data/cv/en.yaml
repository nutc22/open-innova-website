hero:
  badge: "Available for new collaborations"
  headline: "Physicist · Cloud & ML Engineer"
  tagline: >-
    I turn complex problems into reliable infrastructure and models that hold up
    in production, with the methodological rigour of experimental physics.
  cta_primary: "Get in touch"
  cta_secondary: "View CV"

profilo:
  eyebrow: "01 — Profile"
  title: "From theory to production systems"
  paragraphs:
    - >-
      I am a physicist by training who designs and runs cloud infrastructure and
      machine learning systems. I bring the experimental method — measure, isolate
      the variables, iterate — into the life cycle of real platforms and models.
    - >-
      I work daily with <strong>AWS and Kubernetes</strong>, build data pipelines,
      and handle anomaly detection along with evaluation and red teaming of
      LLM-based agents. I care about reliability: observability, cost control,
      reproducibility.
    - >-
      I look for essential systems: few dependencies, predictable behaviour, honest
      documentation. This site is an example — static, no cookies, no tracking.

